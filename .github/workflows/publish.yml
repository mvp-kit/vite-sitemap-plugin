name: Publish Package

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test -- --run

      - name: Build package
        run: bun run build

      - name: Check package version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          if npm view "@mvp-kit/vite-sitemap-plugin@$CURRENT" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "publish=false" >> $GITHUB_OUTPUT
            echo "Version $CURRENT already exists on npm, skipping publish."
          else
            echo "publish=true" >> $GITHUB_OUTPUT
            echo "Version $CURRENT is new, publishing to npm."
          fi

      - name: Check package contents
        if: steps.version.outputs.publish == 'true'
        run: npm pack --dry-run

      - name: Publish to npm
        if: steps.version.outputs.publish == 'true'
        run: |
          echo "Publishing version ${{ steps.version.outputs.current }} to npm"
          npm publish --provenance --access public --registry=https://registry.npmjs.org

      - name: Create Git tag
        if: steps.version.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="v${{ steps.version.outputs.current }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin, skipping."
            exit 0
          fi

          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
